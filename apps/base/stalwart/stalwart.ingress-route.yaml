apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: stalwart-ingress-route-http
  namespace: stalwart-system
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`mail.winetree94.com`)
      kind: Rule
      middlewares:
        - name: redirect-to-https
      services:
        - name: stalwart-web-service
          port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: stalwart-ingress-route-https
  namespace: stalwart-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`mail.winetree94.com`)
      kind: Rule
      middlewares:
        - name: stalwart-jmap-cors
      services:
        - name: stalwart-web-service
          port: 80
  tls:
    secretName: letsencrypt-cert
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: stalwart-jmap-cors
  namespace: stalwart-system
spec:
  headers:
    accessControlAllowOriginList:
      - https://webmail.winetree94.com
    accessControlAllowMethods:
      - GET
      - POST
      - OPTIONS
    accessControlAllowHeaders:
      - Authorization
      - Content-Type
      - Accept
      - X-Requested-With
    accessControlMaxAge: 86400
    addVaryHeader: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: stalwart-system
spec:
  redirectScheme:
    scheme: https
    permanent: true
