apiVersion: apps/v1
kind: Deployment
metadata:
  name: stalwart-deployment
  namespace: stalwart-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stalwart
  template:
    metadata:
      labels:
        app: stalwart
    spec:
      initContainers:
        - name: render-stalwart-config
          image: busybox:1.38.0
          command:
            - sh
            - -c
            - |
              cat > /config/config.json <<EOF
              {
                "@type": "PostgreSql",
                "host": "stalwart-database-cluster-rw.stalwart-system.svc.cluster.local",
                "port": 5432,
                "database": "stalwart",
                "authUsername": "stalwart",
                "authSecret": {
                  "@type": "Value",
                  "secret": "${DATABASE_PASSWORD}"
                },
                "useTls": false,
                "allowInvalidCerts": false,
                "timeout": 15000,
                "poolMaxConnections": 10
              }
              EOF
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stalwart-database-user-secret
                  key: password
          volumeMounts:
            - name: stalwart-config-runtime
              mountPath: /config
      containers:
        - name: stalwart
          image: stalwartlabs/stalwart:v0.16.10
          imagePullPolicy: IfNotPresent
          args:
            - --config=/etc/stalwart/config.json
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "3Gi"
              cpu: "4"
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          ports:
            - containerPort: 80
            - containerPort: 443
            - containerPort: 25
            - containerPort: 587
            - containerPort: 465
            - containerPort: 143
            - containerPort: 993
            - containerPort: 4190
            - containerPort: 110
            - containerPort: 995
          volumeMounts:
            - name: stalwart-config-runtime
              mountPath: "/etc/stalwart/config.json"
              subPath: "config.json"
              readOnly: true
          env:
            - name: STALWART_PUBLIC_URL
              value: https://mail.winetree94.com
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: stalwart-secret
                  key: admin-username
            - name: ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: stalwart-secret
                  key: admin-secret
            - name: SMTP2GO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: stalwart-smtp2go-secret
                  key: SMTP2GO_USERNAME
            - name: SMTP2GO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stalwart-smtp2go-secret
                  key: SMTP2GO_PASSWORD
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stalwart-database-user-secret
                  key: password
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: tinyrack-s3-secret
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: tinyrack-s3-secret
                  key: AWS_SECRET_ACCESS_KEY
      volumes:
        - name: stalwart-config-runtime
          emptyDir: {}
