apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: mail-server-http-endpoints
  namespace: kube-prometheus-stack-system
  labels:
    release: kube-prometheus-stack
spec:
  interval: 1m
  scrapeTimeout: 30s
  module: http_2xx
  prober:
    url: blackbox-exporter-prometheus-blackbox-exporter.observability-system.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - https://mail.winetree94.com/admin/login
