apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blackbox-exporter-release
  namespace: flux-system
spec:
  targetNamespace: observability-system
  storageNamespace: observability-system
  install:
    createNamespace: true
  chart:
    spec:
      chart: prometheus-blackbox-exporter
      version: "11.10.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  interval: 5m
  timeout: 5m
  releaseName: blackbox-exporter
  values:
    ingress:
      enabled: false
    serviceMonitor:
      enabled: false
