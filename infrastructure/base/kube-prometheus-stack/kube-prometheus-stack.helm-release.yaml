apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack-release
  namespace: kube-prometheus-stack-system
spec:
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "83.4.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  interval: 5m
  timeout: 10m
  releaseName: kube-prometheus-stack
  values:
    alertmanager:
      config:
        global:
          resolve_timeout: 5m
        inhibit_rules:
          - source_matchers:
              - severity = critical
            target_matchers:
              - severity =~ warning|info
            equal:
              - namespace
              - alertname
          - source_matchers:
              - severity = warning
            target_matchers:
              - severity = info
            equal:
              - namespace
              - alertname
        route:
          group_by:
            - cluster
            - namespace
            - alertname
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: telegram
          routes:
            - receiver: 'null'
              matchers:
                - alertname = "Watchdog"
        receivers:
          - name: 'null'
          - name: telegram
            telegram_configs:
              - api_url: https://api.telegram.org
                bot_token_file: /etc/alertmanager/secrets/alertmanager-telegram/bot_token
                chat_id: -1003609470982
                message_thread_id: 2
                parse_mode: HTML
                send_resolved: true
                message: |-
                  {{ if eq .Status "firing" }}[FIRING]{{ else }}[RESOLVED]{{ end }} <b>[mail-server] {{ .CommonLabels.alertname }}</b>
                  <b>Status:</b> {{ .Status }}
                  <b>Severity:</b> {{ .CommonLabels.severity }}
                  {{ if .CommonLabels.namespace }}<b>Namespace:</b> {{ .CommonLabels.namespace }}{{ end }}
                  {{ range .Alerts }}
                  - {{ if .Annotations.summary }}{{ .Annotations.summary }}{{ else }}{{ .Labels.alertname }}{{ end }}
                  {{ if .Annotations.description }}  {{ .Annotations.description }}{{ end }}
                  {{ end }}
      alertmanagerSpec:
        secrets:
          - alertmanager-telegram
    grafana:
      additionalDataSources:
        - name: Loki
          type: loki
          access: proxy
          url: http://loki.observability-system.svc.cluster.local:3100
          isDefault: false
      persistence:
        enabled: true
        type: pvc
        storageClassName: local-path
        accessModes:
          - ReadWriteOnce
        size: 2Gi
      ingress:
        enabled: false
    prometheus:
      prometheusSpec:
        externalLabels:
          cluster: mail-server
        retention: 15d
        retentionSize: 40GB
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 5Gi
