apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: k3s-upgrade-plan
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/base/k3s-upgrade
  prune: true
  wait: true
  timeout: 30m
  dependsOn:
    - name: system-upgrade-controller
  sourceRef:
    kind: GitRepository
    name: flux-system
